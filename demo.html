<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Пример реализации — testIdea</title>
  <meta name="description" content="Живой пример реализации идеи из каталога testIdea." />
  <link rel="stylesheet" href="assets/style.css" />
  <style>
    .demo-wrap{padding:18px 0 70px}.demo-top{display:grid;grid-template-columns:.8fr 1.2fr;gap:18px;margin-bottom:18px}.demo-card{border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.055));box-shadow:var(--shadow);padding:24px;overflow:hidden}.demo-title{font-size:clamp(34px,6vw,76px);line-height:.92;letter-spacing:-.07em;margin:10px 0 16px}.demo-sub{font-size:18px;line-height:1.55;color:var(--muted);margin:0}.demo-stage{min-height:620px;border-radius:30px;border:1px solid rgba(255,255,255,.16);background:#120d17;overflow:hidden}.demo-browser{height:34px;display:flex;align-items:center;gap:8px;padding:0 14px;background:rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.1)}.demo-dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.5)}.demo-body{padding:24px}.demo-grid{display:grid;gap:14px}.demo-grid.two{grid-template-columns:repeat(2,1fr)}.demo-grid.three{grid-template-columns:repeat(3,1fr)}.demo-box{border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.08);border-radius:22px;padding:18px}.demo-box h3,.demo-box h4{margin:0 0 10px}.demo-box p,.small{color:rgba(255,247,251,.7);line-height:1.5}.mock-photo{min-height:150px;border-radius:24px;background:linear-gradient(135deg,rgba(255,95,158,.28),rgba(255,209,102,.16));display:grid;place-items:center;font-size:46px}.demo-btn{border:0;border-radius:999px;padding:12px 16px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,var(--accent),#ff8bc1);color:#170810}.ghost-btn{border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:var(--text);border-radius:999px;padding:10px 14px;font-weight:800}.doc-paper{background:#fff;color:#17121a;border-radius:18px;padding:26px;box-shadow:0 24px 60px rgba(0,0,0,.34)}.doc-paper h3,.doc-paper h4{color:#17121a}.doc-paper p,.doc-paper li{color:#3d3542}.doc-line{height:9px;background:rgba(0,0,0,.12);border-radius:999px;margin:9px 0}.seal{width:88px;height:88px;border-radius:50%;border:3px double rgba(255,95,158,.85);display:grid;place-items:center;color:#ff5f9e;font-weight:900}.avatar{width:74px;height:74px;border-radius:20px;background:rgba(255,255,255,.12);display:grid;place-items:center;font-size:34px}.price-tag{color:var(--accent-2);font-size:28px;font-weight:900}.side-list{margin:18px 0 0;padding-left:18px;color:var(--muted);line-height:1.8}.envelope{min-height:120px;display:grid;place-items:center;text-align:center;cursor:pointer;transition:.2s}.envelope:hover{transform:translateY(-3px);background:rgba(255,255,255,.13)}.revealed{background:rgba(255,95,158,.15)}.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.task{border-radius:16px;background:rgba(255,255,255,.09);padding:12px;margin-top:10px}.check{display:flex;gap:10px;align-items:flex-start;margin:10px 0;color:rgba(255,247,251,.75)}.check input{margin-top:4px}@media(max-width:960px){.demo-top,.demo-grid.two,.demo-grid.three,.kanban{grid-template-columns:1fr}.demo-stage{min-height:auto}}
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <nav class="nav">
        <a class="logo" href="index.html"><span class="logo-mark">⚡</span><span>testIdea</span></a>
        <div class="nav-links"><a href="index.html#catalog">← Каталог</a><a id="mvp-link" href="mvp.html">Описание</a><a id="visual-link" href="visual.html">Визуал</a></div>
      </nav>
      <div id="root"></div>
    </section>
  </main>

  <script src="data/ideas.js"></script>
  <script>
    const params=new URLSearchParams(location.search);const id=params.get('id')||'love-site';const ideas=window.IDEAS||[];const item=ideas.find(x=>x.id===id)||ideas[0];
    document.querySelector('#mvp-link').href=`mvp.html?id=${item.id}`;document.querySelector('#visual-link').href=`visual.html?id=${item.id}`;document.title=`${item.title} — пример реализации`;
    const root=document.querySelector('#root');
    const chip=t=>`<span class="chip">${t}</span>`;
    const list=a=>(a||[]).slice(0,5).map(x=>`<li>${x}</li>`).join('');

    function loveSite(){return `<div class="demo-stage"><div class="demo-browser"><span class="demo-dot"></span><span class="demo-dot"></span><span class="demo-dot"></span></div><div class="demo-body" style="background:radial-gradient(circle at 15% 0%,rgba(255,95,158,.3),transparent 28%),linear-gradient(160deg,#201020,#101422)"><div class="demo-grid two"><div><div class="mock-photo">💑</div><h2 class="demo-title" style="font-size:54px">Аня + Максим</h2><p class="demo-sub">Наш маленький сайт: музыка, история, таймер и секретные конверты.</p><div class="hero-actions"><button class="demo-btn" onclick="alert('Играет ваша песня 🎵')">▶ Включить песню</button><button class="ghost-btn" onclick="alert('Вы вместе 486 дней 💗')">Таймер любви</button></div></div><div class="demo-grid"><div class="demo-box"><h3>Наша история</h3><p>Мы познакомились случайно, но будто кто-то заранее поставил точку на карте.</p></div><div class="demo-grid two"><div class="demo-box envelope" onclick="this.classList.toggle('revealed');this.innerHTML='Я люблю, как ты смеёшься даже в самый странный день 💗'">Открыть, когда скучаешь</div><div class="demo-box envelope" onclick="this.classList.toggle('revealed');this.innerHTML='Я выбираю тебя не потому что легко, а потому что настоящее.'">Открыть, если грустно</div></div><div class="demo-box"><button class="demo-btn" onclick="alert('Секрет: ты мой дом.')">Секретное признание</button></div></div></div></div></div>`}
    function archive(){return `<div class="demo-stage"><div class="demo-browser"><span class="demo-dot"></span><span class="demo-dot"></span><span class="demo-dot"></span></div><div class="demo-body"><div class="demo-grid two"><div class="doc-paper"><h3>Архив любви</h3><p>Глава 1. Как всё началось</p><div class="doc-line" style="width:90%"></div><div class="doc-line" style="width:74%"></div><div class="mock-photo">📷</div></div><div class="doc-paper"><h3>Таймлайн</h3><ul><li>Первое сообщение</li><li>Первое свидание</li><li>Самая смешная ссора</li><li>Наша фраза года</li></ul><h4>10 причин, почему мы не случайность</h4><div class="doc-line"></div><div class="doc-line" style="width:70%"></div></div></div></div></div>`}
    function dateBox(){return `<div class="demo-stage"><div class="demo-browser"><span class="demo-dot"></span><span class="demo-dot"></span><span class="demo-dot"></span></div><div class="demo-body"><h2 class="demo-title" style="font-size:48px">7 вечеров для двоих</h2><div class="demo-grid three">${['Кино без телефонов','Кулинарный батл','Квест по квартире','Письмо в будущее','Вечер вопросов','Свидание вслепую'].map(x=>`<div class="demo-box envelope" onclick="this.classList.toggle('revealed')"><h4>${x}</h4><p>Открыть карточку и выполнить сценарий вечера.</p></div>`).join('')}</div></div></div>`}
    function letters(){return `<div class="demo-stage"><div class="demo-browser"><span class="demo-dot"></span><span class="demo-dot"></span><span class="demo-dot"></span></div><div class="demo-body"><h2 class="demo-title" style="font-size:48px">Письма из будущего</h2><div class="demo-grid two">${['Нам через 1 год','Если мы поссорились','Когда тебе грустно','Почему я выбираю тебя'].map((x,i)=>`<div class="demo-box envelope" onclick="this.classList.add('revealed');this.innerHTML='<h4>${x}</h4><p>Даже если день сложный, я всё равно на твоей стороне. Это письмо создано, чтобы вернуть тепло.</p>'"><h4>✉️ ${x}</h4><p>Нажми, чтобы открыть письмо.</p></div>`).join('')}</div></div></div>`}
    function passport(){return `<div class="demo-stage"><div class="demo-browser"><span class="demo-dot"></span><span class="demo-dot"></span><span class="demo-dot"></span></div><div class="demo-body"><div class="doc-paper"><div style="display:flex;justify-content:space-between;gap:18px"><div><h3>ПАСПОРТ ПАРЫ</h3><p>Серия LOVE № 0001</p></div><div class="seal">LOVE</div></div><hr><p><b>Граждане отношений:</b> Аня и Максим</p><p><b>Дата основания:</b> 14.02.2026</p><p><b>Особые приметы:</b> шутят одинаково странно, мирятся через чай, спорят о фильмах.</p><p><b>Права:</b> обнимать без предупреждения, воровать худи, включать любимую песню.</p><p><b>Обязанности:</b> беречь, слышать, выбирать друг друга.</p></div></div></div>`}
    function order(){return `<div class="demo-stage"><div class="demo-browser"><span class="demo-dot"></span><span class="demo-dot"></span><span class="demo-dot"></span></div><div class="demo-body" style="background:linear-gradient(160deg,#20170e,#15101c)"><div class="doc-paper" style="background:#f7ead0"><div style="text-align:center"><div style="font-size:78px">🛡️</div><h3>Орден Двух Сердец</h3><p>Свиток основания личного союза</p></div><p>В день, когда два пути пересеклись, был основан малый орден верности, смеха и памяти.</p><p><b>Клятва:</b> создавать, защищать и оставаться людьми даже в трудные дни.</p></div></div></div>`}
    function avito(){return `<div class="demo-stage"><div class="demo-browser"><span class="demo-dot"></span><span class="demo-dot"></span><span class="demo-dot"></span></div><div class="demo-body"><div class="demo-grid two"><div class="mock-photo">📦</div><div><h2>iPhone 12 128GB — аккуратный, полный комплект</h2><div class="price-tag">24 900 ₽</div><p class="small">Упакованное объявление: понятный заголовок, честное состояние, структура фото и ответы на вопросы.</p><div class="demo-box"><h4>Почему стоит купить</h4><ul><li>Без скрытых дефектов</li><li>Фото всех сторон</li><li>Готов к проверке при встрече</li></ul></div></div></div></div></div>`}
    function landing(){return `<div class="demo-stage"><div class="demo-browser"><span class="demo-dot"></span><span class="demo-dot"></span><span class="demo-dot"></span></div><div class="demo-body"><section class="demo-box"><h2 class="demo-title" style="font-size:52px">Электрик в Твери за 1 день</h2><p class="demo-sub">Розетки, свет, щиток, диагностика. Приеду, объясню, сделаю аккуратно.</p><button class="demo-btn">Написать мастеру</button></section><div class="demo-grid three"><div class="demo-box"><h4>Услуги</h4><p>Замена розеток, автоматов, светильников</p></div><div class="demo-box"><h4>Цены</h4><p>от 900 ₽</p></div><div class="demo-box"><h4>Отзывы</h4><p>“Быстро и без лишних слов”</p></div></div></div></div>`}
    function electric(){return `<div class="demo-stage"><div class="demo-browser"><span class="demo-dot"></span><span class="demo-dot"></span><span class="demo-dot"></span></div><div class="demo-body"><div class="doc-paper"><h3>Отчёт мини-аудита электрики</h3><p><b>Объект:</b> квартира, 2 комнаты</p><ul><li>Щиток: требуется маркировка линий</li><li>Розетка кухни: есть нагрев под нагрузкой</li><li>Ванная: проверить УЗО</li></ul><h4>Приоритет работ</h4><ol><li>Заменить проблемную розетку</li><li>Подписать автоматы</li><li>Проверить защиту ванной</li></ol></div></div></div>`}
    function docs(){return `<div class="demo-stage"><div class="demo-browser"><span class="demo-dot"></span><span class="demo-dot"></span><span class="demo-dot"></span></div><div class="demo-body"><div class="doc-paper"><p style="text-align:right">Кому: Управляющей компании<br>От: Иванова И.И.</p><h3>Заявление</h3><p>Прошу провести проверку и устранить неисправность, связанную с регулярным отключением электропитания в квартире.</p><p><b>Обстоятельства:</b> проблема повторяется с 10.06.2026, зафиксированы обращения и фотографии.</p><p><b>Прошу:</b> провести осмотр, составить акт и сообщить срок устранения.</p><p>Приложения: фото, переписка, квитанции.</p></div></div></div>`}
    const renderers={
      'love-site':loveSite,'love-archive':archive,'date-box':dateBox,'future-letters':letters,'couple-passport':passport,'love-order':order,'avito-pack':avito,'master-landing':landing,'electrician-audit':electric,'document-helper':docs
    };
    const demo=(renderers[item.id]||loveSite)();
    root.innerHTML=`<div class="demo-wrap"><div class="demo-top"><div class="demo-card"><span class="kicker">Пример реализации · ${item.category}</span><h1 class="demo-title">${item.title}</h1><p class="demo-sub">Это не абстрактный мокап, а мини-пример того, как идея может выглядеть для клиента в готовом продукте.</p><div class="hero-actions">${chip(item.status)}${chip(item.price)}${chip(item.time)}</div><ul class="side-list"><li><b>Крючок:</b> ${item.hook}</li><li><b>Что продавать:</b> ${item.cta}</li></ul><div class="hero-actions"><a class="btn primary" href="mvp.html?id=${item.id}">Описание MVP</a><a class="btn" href="index.html#catalog">Каталог</a></div></div><div class="demo-card">${demo}</div></div><section class="sections"><article class="panel section"><h3>Что входит в продажу</h3><ul>${list(item.includes)}</ul></article><article class="panel section"><h3>Что нужно от клиента</h3><ul>${list(item.clientData)}</ul></article></section></div>`;
  </script>
</body>
</html>
