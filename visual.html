<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Визуальный просмотр — testIdea</title>
  <meta name="description" content="Визуальный просмотр любой идеи из каталога testIdea." />
  <link rel="stylesheet" href="assets/style.css" />
  <style>
    .visual-layout { display:grid; grid-template-columns: 1fr 1fr; gap:22px; padding: 18px 0 56px; }
    .panelx { border:1px solid var(--line); background:linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.06)); border-radius:var(--radius); box-shadow:var(--shadow); padding:24px; }
    .visual-title { margin:8px 0 14px; font-size:clamp(34px,5vw,68px); line-height:.95; letter-spacing:-.06em; }
    .visual-sub { color:var(--muted); font-size:18px; line-height:1.55; margin:0 0 18px; }
    .mini-list { margin:18px 0 0; padding-left:18px; color:var(--muted); line-height:1.7; }
    .scene { min-height:560px; border-radius:26px; border:1px solid rgba(255,255,255,.18); overflow:hidden; background: linear-gradient(160deg, #160d19, #101826 60%, #171119); }
    .topbar { display:flex; align-items:center; gap:8px; height:34px; padding:0 14px; border-bottom:1px solid rgba(255,255,255,.10); background:rgba(255,255,255,.04); }
    .dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.5); }
    .bodyx { padding:22px; display:grid; gap:16px; }
    .hero-card, .slot, .cta-box { border:1px solid rgba(255,255,255,.12); border-radius:22px; background:rgba(255,255,255,.08); }
    .hero-card { padding:18px; }
    .hero-row { display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
    .big-icon { width:92px; height:92px; border-radius:24px; display:grid; place-items:center; font-size:40px; background:rgba(255,255,255,.12); }
    .scene-title { margin:0; font-size:30px; letter-spacing:-.04em; }
    .scene-text { margin:0; color:rgba(255,247,251,.75); line-height:1.5; }
    .micro-row { display:flex; gap:8px; flex-wrap:wrap; }
    .micro { padding:7px 11px; border-radius:999px; background:rgba(255,255,255,.12); font-size:12px; font-weight:700; }
    .grid2, .grid3 { display:grid; gap:12px; }
    .grid2 { grid-template-columns:repeat(2,1fr); }
    .grid3 { grid-template-columns:repeat(3,1fr); }
    .slot { padding:14px; min-height:100px; display:flex; flex-direction:column; justify-content:space-between; }
    .slot strong { font-size:14px; }
    .slot span { font-size:12px; color:rgba(255,247,251,.66); }
    .cta-box { padding:18px; display:flex; justify-content:space-between; align-items:center; gap:14px; }
    .note { font-size:13px; color:rgba(255,247,251,.65); }
    @media (max-width:960px) { .visual-layout, .grid2, .grid3 { grid-template-columns:1fr; } .cta-box { flex-direction:column; align-items:stretch; } }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <nav class="nav">
        <a class="logo" href="index.html"><span class="logo-mark">⚡</span><span>testIdea</span></a>
        <div class="nav-links">
          <a href="index.html#catalog">← Каталог</a>
          <a id="mvp-link" href="mvp.html">Описание MVP</a>
          <a href="data/ideas.js">Данные</a>
        </div>
      </nav>
      <div id="visual-root"></div>
    </section>
  </main>

  <script src="data/ideas.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get('id') || 'love-site';
    const ideas = window.IDEAS || [];
    const item = ideas.find(idea => idea.id === id) || ideas[0];
    const root = document.querySelector('#visual-root');
    document.querySelector('#mvp-link').href = `mvp.html?id=${item.id}`;

    const icons = { romantic:'💗', book:'📖', box:'🎁', letters:'✉️', passport:'📜', order:'🛡️', market:'🛒', landing:'🌐', electric:'⚡', docs:'📝' };
    const icon = icons[item.visual] || '✨';
    const show = (arr, count) => (arr || []).slice(0, count);
    const slots = show(item.includes, 6).map(text => `<div class="slot"><strong>${text}</strong><span>${item.category}</span></div>`).join('');
    const chips = show(item.audience, 4).map(text => `<span class="micro">${text}</span>`).join('');
    const mvpSteps = show(item.mvp, 3).map(text => `<li>${text}</li>`).join('');

    document.title = `${item.title} — визуальный просмотр`;
    root.innerHTML = `
      <div class="visual-layout">
        <div class="panelx">
          <span class="kicker">Визуальный просмотр · ${item.category}</span>
          <h1 class="visual-title">${item.title}</h1>
          <p class="visual-sub">${item.tagline}</p>
          <p class="visual-sub"><strong>Идея фишки:</strong> теперь любую карточку можно открыть как демо-сцену — чтобы увидеть не только описание, но и приблизительный визуальный формат будущего продукта.</p>
          <div class="hero-actions">
            <span class="chip">Статус: ${item.status}</span>
            <span class="chip">Цена: ${item.price}</span>
            <span class="chip">Срок: ${item.time}</span>
          </div>
          <ul class="mini-list">
            <li><strong>Крючок:</strong> ${item.hook}</li>
            <li><strong>Для кого:</strong> ${show(item.audience, 3).join(' · ')}</li>
            <li><strong>Следующий шаг:</strong> по этому визуалу можно уже делать отдельный реальный MVP-проект.</li>
          </ul>
          <div class="hero-actions" style="margin-top:24px;">
            <a class="btn primary" href="mvp.html?id=${item.id}">Описание MVP</a>
            <a class="btn" href="index.html#catalog">Назад в каталог</a>
          </div>
        </div>
        <div class="panelx">
          <div class="scene">
            <div class="topbar"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
            <div class="bodyx">
              <div class="hero-card">
                <div class="hero-row">
                  <div class="big-icon">${icon}</div>
                  <div>
                    <h3 class="scene-title">${item.title}</h3>
                    <p class="scene-text">${item.tagline}</p>
                  </div>
                </div>
              </div>
              <div class="micro-row">${chips}</div>
              <div class="grid3">${slots}</div>
              <div class="grid2">
                <div class="slot"><strong>Что видит клиент</strong><span>${item.cta}</span></div>
                <div class="slot"><strong>Апсейл</strong><span>${show(item.upsell, 2).join(' · ')}</span></div>
              </div>
              <div class="cta-box">
                <div>
                  <strong>Как это выглядит в продаже</strong>
                  <div class="note">Готовая визуальная подача идеи: оффер + состав + структура + ощущение продукта.</div>
                </div>
                <a class="btn primary" href="mvp.html?id=${item.id}">К подробностям</a>
              </div>
            </div>
          </div>
        </div>
      </div>
      <section class="sections" style="padding-bottom:70px;">
        <article class="panel section">
          <h3>Первые шаги MVP</h3>
          <ol>${mvpSteps}</ol>
        </article>
        <article class="panel section">
          <h3>Что понадобится от клиента</h3>
          <ul>${show(item.clientData, 6).map(text => `<li>${text}</li>`).join('')}</ul>
        </article>
      </section>
    `;
  </script>
</body>
</html>
